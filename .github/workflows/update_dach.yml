name: Update DACH Data

on:
  schedule:
    - cron: '*/15 8-17 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/fetch_dach.py']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch DACH data
        run: python scripts/fetch_dach.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dach.json
          git diff --cached --quiet && echo "No changes" || (
            git restore --staged data/dach.json &&
            git pull --rebase origin main &&
            git add data/dach.json &&
            git commit -m "chore: update dach data [skip ci]" &&
            git push
          )
