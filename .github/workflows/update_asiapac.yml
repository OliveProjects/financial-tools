name: Update Asia Pacific Data

on:
  schedule:
    - cron: '*/15 0-9 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/fetch_asiapac.py']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch Asia Pacific data
        run: python scripts/fetch_asiapac.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/asiapac.json /tmp/asiapac_fresh.json
          git checkout -- data/asiapac.json
          git pull --rebase origin main
          cp /tmp/asiapac_fresh.json data/asiapac.json
          git add data/asiapac.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "chore: update asiapac data [skip ci]" &&
            git push
          )
