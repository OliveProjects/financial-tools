name: Update VS Performance Data

on:
  schedule:
    # Once daily at 21:15 UTC (after US market close at ~21:00)
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch VS performance data
        run: python scripts/fetch_vs.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vs.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "chore: update vs performance data [skip ci]" &&
            git push
          )
