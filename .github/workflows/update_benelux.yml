name: Update Benelux Data

on:
  schedule:
    - cron: '*/15 8-17 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/fetch_benelux.py']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch Benelux data
        run: python scripts/fetch_benelux.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/benelux.json /tmp/benelux_fresh.json
          git checkout -- data/benelux.json
          git pull --rebase origin main
          cp /tmp/benelux_fresh.json data/benelux.json
          git add data/benelux.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "chore: update benelux data [skip ci]" &&
            git push
          )
