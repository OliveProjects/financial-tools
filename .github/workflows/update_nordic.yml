name: Update Nordic Data

on:
  schedule:
    - cron: '*/15 8-16 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/fetch_nordic.py']

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch Nordic data
        run: python scripts/fetch_nordic.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nordic.json
          git diff --cached --quiet || git commit -m "chore: update nordic data"
          git push
